name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS Universal
            artifact-prefix: macOS_Universal
            args: --mac --universal
          - os: ubuntu-22.04
            name: Linux x86_64
            artifact-prefix: Linux_x86_64
            args: --linux
          - os: windows-latest
            name: Windows x64
            artifact-prefix: Windows_x64
            args: --win

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npx electron-vite build && npx electron-builder ${{ matrix.args }} --publish never

      - name: Stage artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp dist/*.dmg "artifacts/QuickMD_${{ needs.release-please.outputs.tag_name }}_${{ matrix.artifact-prefix }}.dmg"

      - name: Stage artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp dist/*.AppImage "artifacts/QuickMD_${{ needs.release-please.outputs.tag_name }}_${{ matrix.artifact-prefix }}.AppImage"
          cp dist/*.deb "artifacts/QuickMD_${{ needs.release-please.outputs.tag_name }}_${{ matrix.artifact-prefix }}.deb"

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item dist\*.exe "artifacts\QuickMD_${{ needs.release-please.outputs.tag_name }}_${{ matrix.artifact-prefix }}_Setup.exe"

      - name: Upload to release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} artifacts/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
